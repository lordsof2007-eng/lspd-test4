<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة عمليات السرقة | FiveM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Firebase (يحفظ المواقع ويزامنها فورياً بين كل من يفتح الموقع) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#0a0e13;
    --bg-panel:#10161d;
    --bg-elevated:#1a222b;
    --bg-elevated-2:#212a34;
    --border:#232c36;
    --grid-line:rgba(255,255,255,0.045);
    --amber:#ffb627;
    --amber-dim:#8a6a23;
    --red:#ff5a5a;
    --text-1:#e8edf2;
    --text-2:#8b97a3;
    --text-3:#5a6570;
    --fleeca:#3ddc84;
    --jewelry:#c792ea;
    --store:#ffb627;
    --house:#5ec8ff;
    --atm:#ff5a5a;
    --other:#9aa5b1;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text-1);
    font-family:'IBM Plex Sans Arabic','Tajawal',sans-serif;
    direction:rtl;
    height:100vh;
    overflow:hidden;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  .app{
    display:flex;
    flex-direction:column;
    height:100vh;
  }

  /* Header */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 20px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg, var(--bg-panel), var(--bg));
    flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:34px;height:34px;border-radius:8px;
    background:radial-gradient(circle at 30% 30%, var(--amber), #7a5618 80%);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;flex-shrink:0;
    box-shadow:0 0 14px rgba(255,182,39,0.35);
  }
  .brand h1{font-size:16px;margin:0;font-weight:700;letter-spacing:0.3px;}
  .brand p{margin:0;font-size:11px;color:var(--text-3);font-family:'IBM Plex Mono',monospace;letter-spacing:0.5px;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .stat-pill{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--text-2);
    background:var(--bg-elevated);
    border:1px solid var(--border);
    padding:6px 12px;
    border-radius:20px;
  }
  .stat-pill b{color:var(--amber);}
  .btn{
    border:none;border-radius:8px;
    padding:9px 16px;
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:transform .12s ease, filter .12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--amber);color:#1a1206;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{background:var(--bg-elevated);color:var(--text-1);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--bg-elevated-2);}
  .btn-danger{background:rgba(255,90,90,0.12);color:var(--red);border:1px solid rgba(255,90,90,0.3);}
  .btn-danger:hover{background:rgba(255,90,90,0.2);}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}

  /* Main layout */
  .main{
    flex:1;
    display:flex;
    overflow:hidden;
  }

  /* Sidebar */
  .sidebar{
    width:320px;
    flex-shrink:0;
    border-left:1px solid var(--border);
    background:var(--bg-panel);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .sidebar-section{padding:14px 16px;}
  .search-box{
    position:relative;
  }
  .search-box input{
    width:100%;
    background:var(--bg-elevated);
    border:1px solid var(--border);
    border-radius:8px;
    padding:9px 12px;
    color:var(--text-1);
    font-family:inherit;
    font-size:13px;
    outline:none;
  }
  .search-box input:focus{border-color:var(--amber-dim);}
  .search-box input::placeholder{color:var(--text-3);}

  .filters{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    padding:0 16px 12px;
  }
  .filter-chip{
    display:flex;align-items:center;gap:6px;
    padding:6px 10px;
    border-radius:20px;
    background:var(--bg-elevated);
    border:1px solid var(--border);
    font-size:12px;
    cursor:pointer;
    user-select:none;
    color:var(--text-2);
    transition:all .12s ease;
  }
  .filter-chip .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .filter-chip.active{
    background:var(--bg-elevated-2);
    color:var(--text-1);
    border-color:var(--cat-color, var(--border));
  }
  .filter-chip .count{font-family:'IBM Plex Mono',monospace;color:var(--text-3);font-size:11px;}

  .divider{height:1px;background:var(--border);margin:0 16px;}

  .list-header{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 16px 8px;
    font-size:11px;color:var(--text-3);
    font-family:'IBM Plex Mono',monospace;letter-spacing:0.8px;
  }
  .list{
    flex:1;
    overflow-y:auto;
    padding:0 12px 12px;
    display:flex;flex-direction:column;gap:8px;
  }
  .empty-hint{
    color:var(--text-3);
    font-size:12.5px;
    text-align:center;
    padding:30px 14px;
    line-height:1.8;
  }
  .loc-card{
    background:var(--bg-elevated);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:10px 12px;
    position:relative;
    border-right:3px solid var(--cat-color);
  }
  .loc-card-top{display:flex;align-items:flex-start;gap:8px;justify-content:space-between;}
  .loc-name{font-size:13.5px;font-weight:600;margin:0 0 2px;}
  .loc-cat{font-size:11px;color:var(--text-3);}
  .loc-icon{font-size:16px;flex-shrink:0;}
  .loc-coords{
    font-size:11.5px;color:var(--text-2);margin-top:6px;
    display:flex;align-items:center;gap:6px;
  }
  .loc-notes{font-size:12px;color:var(--text-2);margin-top:6px;line-height:1.5;}
  .loc-actions{display:flex;gap:6px;margin-top:8px;}
  .icon-btn{
    background:none;border:none;color:var(--text-3);cursor:pointer;
    font-size:12px;padding:3px 6px;border-radius:5px;
  }
  .icon-btn:hover{background:var(--bg-elevated-2);color:var(--text-1);}

  .sidebar-footer{
    padding:12px 16px;
    border-top:1px solid var(--border);
    display:flex;gap:8px;
  }

  /* Map area */
  .map-wrap{
    flex:1;
    position:relative;
    overflow:hidden;
    background:var(--bg);
    cursor:default;
  }
  .map-stage{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    transform-origin:0 0;
    cursor:crosshair;
    background:
      repeating-linear-gradient(0deg, var(--grid-line) 0 1px, transparent 1px 40px),
      repeating-linear-gradient(90deg, var(--grid-line) 0 1px, transparent 1px 40px),
      radial-gradient(ellipse at 50% 40%, #0d1218 0%, var(--bg) 70%);
  }
  .map-stage.zoomed{ cursor:grab; }
  .map-stage.panning{ cursor:grabbing; }
  .zoom-controls{
    position:absolute;
    bottom:18px;
    left:18px;
    display:flex;
    flex-direction:column;
    gap:3px;
    background:var(--bg-elevated);
    border:1px solid var(--border);
    border-radius:10px;
    padding:5px;
    z-index:10;
  }
  .zoom-controls button{
    width:30px;height:30px;
    border:none;border-radius:7px;
    background:var(--bg-elevated-2);
    color:var(--text-1);
    font-size:15px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .zoom-controls button:hover{background:var(--border);}
  .zoom-controls button:disabled{opacity:0.35;cursor:default;}
  .zoom-controls button:disabled:hover{background:var(--bg-elevated-2);}
  .zoom-level{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    text-align:center;
    color:var(--text-3);
    padding:2px 0;
  }
  .zone{
    position:absolute;
    border-radius:18px;
    background:rgba(255,255,255,0.015);
    border:1px dashed rgba(255,255,255,0.06);
    pointer-events:none;
  }
  .zone-label{
    position:absolute;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:rgba(255,255,255,0.18);
    letter-spacing:1.5px;
    pointer-events:none;
    text-transform:uppercase;
  }
  .scanline{
    position:absolute;
    top:0;left:0;
    width:2px;height:100%;
    background:linear-gradient(180deg, transparent, rgba(255,182,39,0.25), transparent);
    animation:sweep 9s linear infinite;
    pointer-events:none;
  }
  @keyframes sweep{
    0%{ left:0%; }
    100%{ left:100%; }
  }
  .ruler-top, .ruler-side{
    position:absolute;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:var(--text-3);
    pointer-events:none;
  }
  .ruler-top{top:6px;left:10px;right:10px;display:flex;justify-content:space-between;}
  .ruler-side{top:10px;bottom:10px;right:6px;display:flex;flex-direction:column;justify-content:space-between;}

  .pin{
    position:absolute;
    transform:translate(-50%, -100%) scale(0.42);
    transform-origin:50% 100%;
    cursor:pointer;
    z-index:5;
    display:flex;
    flex-direction:column;
    align-items:center;
    transition:transform .16s cubic-bezier(.34,1.45,.64,1);
  }
  .pin:hover,
  .pin:focus-visible{
    transform:translate(-50%, -100%) scale(1.08);
    z-index:8;
  }
  .pin:active{
    transform:translate(-50%, -100%) scale(1.18);
    z-index:9;
  }
  .pin-badge{
    width:30px;height:30px;
    border-radius:50%;
    background:var(--pin-color);
    box-shadow:0 0 0 3px rgba(0,0,0,0.45), 0 0 14px var(--pin-color);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    z-index:2;
    transition:filter .12s ease;
  }
  .pin-badge span{
    font-size:15px;
    line-height:1;
  }
  .pin-tip{
    width:0;height:0;
    border-left:6px solid transparent;
    border-right:6px solid transparent;
    border-top:8px solid var(--pin-color);
    margin-top:-3px;
    filter:drop-shadow(0 2px 1px rgba(0,0,0,0.35));
    position:relative;
    z-index:1;
  }
  .pin:hover .pin-badge{ filter:brightness(1.25); }
  .pin-tooltip{
    position:absolute;
    bottom:calc(100% + 8px);
    left:50%;
    transform:translateX(-50%) translateY(4px);
    background:var(--bg-elevated-2);
    border:1px solid var(--pin-color);
    color:var(--text-1);
    font-size:13px;
    font-weight:700;
    padding:6px 13px;
    border-radius:8px;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition:opacity .14s ease, transform .14s ease;
    z-index:20;
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
  }
  .pin-tooltip::after{
    content:'';
    position:absolute;
    top:100%;left:50%;
    transform:translateX(-50%);
    border:5px solid transparent;
    border-top-color:var(--pin-color);
  }
  .pin:hover .pin-tooltip{ opacity:1; transform:translateX(-50%) translateY(0); }

  .map-hint{
    position:absolute;
    bottom:18px;left:50%;
    transform:translateX(-50%);
    background:rgba(16,22,29,0.85);
    border:1px solid var(--border);
    color:var(--text-3);
    font-size:12px;
    padding:8px 16px;
    border-radius:20px;
    backdrop-filter:blur(4px);
    pointer-events:none;
  }
  .map-hint.placing-hint{
    border-color:var(--amber-dim);
    color:var(--amber);
    font-weight:600;
  }

  /* Placement reticle (custom circular cursor shown while adding a location) */
  .place-reticle{
    position:fixed;
    top:0;left:0;
    width:26px;height:26px;
    border-radius:50%;
    border:2px solid var(--amber);
    background:rgba(255,182,39,0.16);
    box-shadow:0 0 0 5px rgba(255,182,39,0.10), 0 0 16px rgba(255,182,39,0.45);
    pointer-events:none;
    z-index:200;
    display:none;
    transform:translate(-50%,-50%);
  }
  .place-reticle::after{
    content:'';
    position:absolute;
    top:50%;left:50%;
    width:4px;height:4px;
    background:var(--amber);
    border-radius:50%;
    transform:translate(-50%,-50%);
  }
  .map-wrap.placing .map-stage,
  .map-wrap.placing .map-stage.zoomed,
  .map-wrap.placing .map-stage.panning,
  .map-wrap.placing .pin{
    cursor:none !important;
  }
  .btn-primary.active{ background:var(--red); color:#fff; }
  .btn-primary.active:hover{ filter:brightness(1.05); }

  /* Modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(5,7,10,0.65);
    display:flex;align-items:center;justify-content:center;
    z-index:50;
    backdrop-filter:blur(2px);
  }
  .modal{
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:14px;
    width:420px;
    max-width:92vw;
    max-height:88vh;
    overflow-y:auto;
    padding:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .modal h2{font-size:16px;margin:0 0 16px;display:flex;align-items:center;gap:8px;}
  .field{margin-bottom:14px;}
  .field label{
    display:block;font-size:12px;color:var(--text-2);margin-bottom:6px;
    font-family:'IBM Plex Mono',monospace;letter-spacing:0.3px;
  }
  .field input, .field textarea{
    width:100%;background:var(--bg-elevated);border:1px solid var(--border);
    border-radius:8px;padding:9px 11px;color:var(--text-1);font-family:inherit;font-size:13.5px;
    outline:none;resize:vertical;
  }
  .field textarea{font-family:inherit;min-height:60px;}
  .field input:focus, .field textarea:focus{border-color:var(--amber-dim);}
  .cat-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .cat-option{
    display:flex;align-items:center;gap:6px;
    padding:8px 12px;border-radius:8px;
    background:var(--bg-elevated);border:1px solid var(--border);
    cursor:pointer;font-size:12.5px;color:var(--text-2);
  }
  .cat-option.selected{
    border-color:var(--cat-color);
    background:var(--bg-elevated-2);
    color:var(--text-1);
  }
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
  .modal.has-image{ width:660px; }
  .modal-body{ display:flex; gap:18px; }
  .modal-fields-col{ flex:1; min-width:0; }
  .modal-image-col{
    width:210px;
    flex-shrink:0;
    display:none;
  }
  .modal.has-image .modal-image-col{ display:block; }
  .img-preview-wrap{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    border-radius:10px;
    overflow:hidden;
    background:var(--bg-elevated);
    border:1px solid var(--border);
  }
  .img-preview-wrap img{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .img-remove-btn{
    position:absolute;
    top:6px;left:6px;
    width:26px;height:26px;
    border-radius:50%;
    border:none;
    background:rgba(10,14,19,0.75);
    color:var(--text-1);
    font-size:13px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .img-remove-btn:hover{ background:var(--red); }
  .img-pick-empty{
    width:100%;aspect-ratio:1/1;
    border-radius:10px;
    border:1.5px dashed var(--border);
    background:var(--bg-elevated);
    color:var(--text-3);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;font-size:12px;cursor:pointer;
    text-align:center;padding:10px;
  }
  .img-pick-empty:hover{ border-color:var(--amber-dim); color:var(--text-2); }
  .img-pick-empty .ic{ font-size:22px; }

  /* Quick view popup (click a pin -> see the photo, edit button on the left) */
  .view-modal{ width:440px; }
  .view-image-wrap{
    width:100%;
    border-radius:10px;
    overflow:hidden;
    background:#000;
    border:1px solid var(--border);
    margin-bottom:4px;
  }
  .view-image-wrap img{
    width:100%;
    max-height:440px;
    object-fit:contain;
    display:block;
  }
  .view-image-empty{
    width:100%;
    aspect-ratio:4/3;
    border-radius:10px;
    border:1.5px dashed var(--border);
    background:var(--bg-elevated);
    color:var(--text-3);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;font-size:13px;
    text-align:center;padding:16px;
  }
  .view-image-empty .ic{ font-size:30px; }
  .field-hint{font-size:11px;color:var(--text-3);margin-top:4px;}

  /* Export modal */
  .export-tabs{display:flex;gap:6px;margin-bottom:12px;}
  .export-tab{
    padding:6px 14px;border-radius:7px;background:var(--bg-elevated);
    border:1px solid var(--border);font-size:12.5px;cursor:pointer;color:var(--text-2);
  }
  .export-tab.active{background:var(--bg-elevated-2);color:var(--amber);border-color:var(--amber-dim);}
  .export-output{
    background:#080a0d;border:1px solid var(--border);border-radius:8px;
    padding:12px;font-family:'IBM Plex Mono',monospace;font-size:12px;
    color:#a8e6b0;white-space:pre;overflow:auto;max-height:320px;direction:ltr;text-align:left;
  }

  /* Toast */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--bg-elevated-2);border:1px solid var(--border);
    color:var(--text-1);padding:10px 16px;border-radius:10px;
    font-size:13px;display:flex;align-items:center;gap:12px;
    z-index:60;box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:toastin .15s ease;
  }
  @keyframes toastin{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}
  .toast a{color:var(--amber);cursor:pointer;font-weight:600;}

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--bg-elevated-2);border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}

  @media (max-width: 720px){
    .sidebar{width:100%;position:absolute;inset:0;z-index:20;}
    .main{position:relative;}
  }
  @media (max-width: 600px){
    .modal.has-image{ width:92vw; }
    .modal-body{ flex-direction:column; }
    .modal-image-col{ width:100%; max-width:220px; margin:0 auto 4px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">🚨</div>
      <div>
        <h1>لوحة عمليات السرقة</h1>
        <p>FIVEM HEIST OPS BOARD</p>
      </div>
    </div>
    <div class="topbar-right">
      <div class="stat-pill">المواقع: <b id="statCount">0</b></div>
      <button class="btn btn-ghost btn-sm" id="loadMapBtn">🗺️ خلفية الخريطة</button>
      <button class="btn btn-ghost btn-sm" id="removeMapBtn" style="display:none">استرجاع الخريطة الافتراضية</button>
      <input type="file" id="mapFileInput" accept="image/*" style="display:none">
      <button class="btn btn-ghost btn-sm" id="exportBtn">تصدير ⤓</button>
      <button class="btn btn-primary" id="addBtn">+ إضافة موقع</button>
    </div>
  </div>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="بحث عن موقع...">
        </div>
      </div>
      <div class="filters" id="filters"></div>
      <div class="divider"></div>
      <div class="list-header">
        <span>قائمة المواقع</span>
        <span id="listCount" class="mono">0</span>
      </div>
      <div class="list" id="list"></div>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-sm" style="flex:1" id="clearFiltersBtn">إعادة ضبط الفلاتر</button>
      </div>
    </aside>

    <main class="map-wrap" id="mapWrap">
      <div class="map-stage" id="mapStage">
        <div class="scanline"></div>
        <div id="zones"></div>
        <div id="pins"></div>
      </div>

/* Compress an uploaded image to a reasonable size before storing it as a data URL */
function compressImageToDataUrl(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.naturalWidth, h = img.naturalHeight;
        if(w > maxDim || h > maxDim){
          if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else{ w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=> reject(new Error('img-load-failed'));
      img.src = reader.result;
    };
    reader.onerror = ()=> reject(new Error('read-failed'));
    reader.readAsDataURL(file);
  });
}

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
  }else{
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}

/* Zoom & pan */
const mapWrap = document.getElementById('mapWrap');
const mapStage = document.getElementById('mapStage');
const zoomLevelEl = document.getElementById('zoomLevel');
const zoomInBtn = document.getElementById('zoomInBtn');
const zoomOutBtn = document.getElementById('zoomOutBtn');
const zoomResetBtn = document.getElementById('zoomResetBtn');
const MIN_ZOOM = 0.5, MAX_ZOOM = 4, ZOOM_STEP = 0.25, WHEEL_STEP = 0.12;
let zoom = 1, panX = 0, panY = 0;
let stageOffsetX = 0, stageOffsetY = 0; // stage's layout position within the wrap (letterbox offset), set by fitStageToImage
let isPanning = false, dragMoved = 0, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;

/* Keeps the map locked in place: clamps pan so you can never drag past its edges.
   If the scaled map is smaller than the viewport on an axis, it's centered and locked on that axis. */
function clampPan(){
  const wrapRect = mapWrap.getBoundingClientRect();
  const wrapW = wrapRect.width, wrapH = wrapRect.height;
  const stageW = mapStage.offsetWidth, stageH = mapStage.offsetHeight;
  const scaledW = zoom * stageW, scaledH = zoom * stageH;

  if(scaledW <= wrapW){
    panX = wrapW / 2 - stageOffsetX - scaledW / 2;
  }else{
    const minPanX = wrapW - stageOffsetX - scaledW;
    const maxPanX = -stageOffsetX;
    panX = Math.min(maxPanX, Math.max(minPanX, panX));
  }
  if(scaledH <= wrapH){
    panY = wrapH / 2 - stageOffsetY - scaledH / 2;
  }else{
    const minPanY = wrapH - stageOffsetY - scaledH;
    const maxPanY = -stageOffsetY;
    panY = Math.min(maxPanY, Math.max(minPanY, panY));
  }
}

function applyTransform(){
  clampPan();
  mapStage.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  zoomLevelEl.textContent = Math.round(zoom * 100) + '%';
  zoomInBtn.disabled = zoom >= MAX_ZOOM;
  zoomOutBtn.disabled = zoom <= MIN_ZOOM;
  mapWrap.classList.toggle('zoomed', zoom > 1);
}

/* Zooms while keeping the point (cx, cy) - relative to the stage's un-transformed layout box - visually fixed */
function zoomAt(nextZoom, cx, cy){
  const clamped = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, nextZoom));
  if(clamped === zoom) return;
  panX = cx - (clamped / zoom) * (cx - panX);
  panY = cy - (clamped / zoom) * (cy - panY);
  zoom = clamped;
  applyTransform();
}

/* Converts a point expressed relative to mapWrap into the stage's local (un-transformed) frame */
function wrapPointToStageFrame(wrapRelX, wrapRelY){
  return { x: wrapRelX - stageOffsetX, y: wrapRelY - stageOffsetY };
}

function stageCenterInWrapFrame(){
  const rect = mapWrap.getBoundingClientRect();
  return wrapPointToStageFrame(rect.width / 2, rect.height / 2);
}

zoomInBtn.onclick = ()=>{ const c = stageCenterInWrapFrame(); zoomAt(zoom + ZOOM_STEP, c.x, c.y); };
zoomOutBtn.onclick = ()=>{ const c = stageCenterInWrapFrame(); zoomAt(zoom - ZOOM_STEP, c.x, c.y); };
zoomResetBtn.onclick = ()=>{ zoom = 1; panX = 0; panY = 0; applyTransform(); };

mapStage.addEventListener('wheel', (e)=>{
  e.preventDefault();
  const wrapRect = mapWrap.getBoundingClientRect();
  const c = wrapPointToStageFrame(e.clientX - wrapRect.left, e.clientY - wrapRect.top);
  const dir = e.deltaY < 0 ? 1 : -1;
  zoomAt(zoom + dir * WHEEL_STEP, c.x, c.y);
}, { passive: false });

mapStage.addEventListener('pointerdown', (e)=>{
  if(zoom <= 1) return;
  if(e.target.closest('.pin')) return;
  isPanning = true; dragMoved = 0;
  dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = panX; panStartY = panY;
  mapStage.setPointerCapture(e.pointerId);
  mapStage.classList.add('panning');
});
mapStage.addEventListener('pointermove', (e)=>{
  if(!isPanning) return;
  const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
  dragMoved = Math.hypot(dx, dy);
  panX = panStartX + dx; panY = panStartY + dy;
  applyTransform();
});
function endPan(){ isPanning = false; mapStage.classList.remove('panning'); }
mapStage.addEventListener('pointerup', endPan);
mapStage.addEventListener('pointercancel', endPan);

/* Placement mode: activated only via the "+ إضافة موقع" button */
const placeReticle = document.getElementById('placeReticle');
const placingHint = document.getElementById('placingHint');
const addBtnEl = document.getElementById('addBtn');

function enterPlacingMode(clientX, clientY){
  state.placingMode = true;
  mapWrap.classList.add('placing');
  addBtnEl.classList.add('active');
  addBtnEl.textContent = '✕ إلغاء التحديد';
  document.getElementById('mapHint').style.display = 'none';
  placingHint.style.display = '';
  placeReticle.style.display = 'block';
  if(typeof clientX === 'number'){
    placeReticle.style.left = clientX + 'px';
    placeReticle.style.top = clientY + 'px';
  }
}

function exitPlacingMode(){
  state.placingMode = false;
  mapWrap.classList.remove('placing');
  addBtnEl.classList.remove('active');
  addBtnEl.textContent = '+ إضافة موقع';
  placingHint.style.display = 'none';
  placeReticle.style.display = 'none';
  document.getElementById('mapHint').style.display = '';
}

document.addEventListener('pointermove', (e)=>{
  if(!state.placingMode) return;
  placeReticle.style.left = e.clientX + 'px';
  placeReticle.style.top = e.clientY + 'px';
});

/* Cancel placement from the mouse itself: right-click anywhere */
document.addEventListener('contextmenu', (e)=>{
  if(state.placingMode){
    e.preventDefault();
    exitPlacingMode();
  }
});

/* Cancel placement by clicking away from the map (e.g. sidebar) */
document.addEventListener('click', (e)=>{
  if(!state.placingMode) return;
  if(e.target.closest('#mapStage')) return;
  if(e.target.closest('#addBtn')) return;
  exitPlacingMode();
});

/* Keyboard fallback to cancel */
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape' && state.placingMode) exitPlacingMode();
});

/* Map click confirms the picked spot — only works while placement mode is active */
mapStage.addEventListener('click', (e)=>{
  if(dragMoved > 5){ dragMoved = 0; return; }
  if(e.target.closest('.pin')) return;
  if(!state.placingMode) return;
  const rect = mapStage.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;
  state.pendingPos = { x: Math.max(1,Math.min(98,x)), y: Math.max(1,Math.min(96,y)) };
  exitPlacingMode();
  openModal(null);
});

            <div class="field-hint">اكتبها بصيغة x, y, z حتى تقدر تصدّرها لاحقاً لسكربت السيرفر</div>
          </div>
          <div class="field">
            <label>ملاحظات (اختياري)</label>
            <textarea id="f_notes" placeholder="تفاصيل، مستوى الحراسة، أفضل وقت...">${existing ? escapeHtml(existing.notes||'') : ''}</textarea>
          </div>
          <div class="field">
            <label>صورة الموقع (اختياري)</label>
            <input type="file" id="f_image" accept="image/*" style="display:none">
            <button type="button" class="btn btn-ghost" id="imgPickBtn" style="width:100%">${currentImage ? '🔄 تغيير الصورة' : '📷 إضافة صورة'}</button>
            <div class="field-hint">تظهر الصورة واضحة بجانب التفاصيل عند فتح الموقع — اضغط ✕ على الصورة لإزالتها</div>
          </div>
        </div>
      </div>

        <button class="btn btn-ghost" id="cancelBtn">إلغاء</button>
        <button class="btn btn-primary" id="saveBtn">${existing ? 'حفظ التعديل' : 'إضافة الموقع'}</button>
      </div>
    </div>
  `;
  root.appendChild(overlay);

  const grid = overlay.querySelector('#catGrid');
  CAT_KEYS.forEach(key=>{
    const cat = CATS[key];
    const opt = document.createElement('div');
    opt.className = 'cat-option' + (selectedCat===key ? ' selected' : '');
    opt.style.setProperty('--cat-color', cat.color);
    opt.textContent = cat.icon + ' ' + cat.label;
    opt.onclick = ()=>{
      selectedCat = key;
      grid.querySelectorAll('.cat-option').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected');
    };
    grid.appendChild(opt);
  });

  /* Image field: pick, preview, remove */
  const modalEl = overlay.querySelector('#locModal');
  const imgPreview = overlay.querySelector('#imgPreview');
  const imgPickBtn = overlay.querySelector('#imgPickBtn');
  const imgFileInput = overlay.querySelector('#f_image');

  function syncImageUI(){
    modalEl.classList.toggle('has-image', !!currentImage);
    imgPreview.src = currentImage || '';
    imgPickBtn.textContent = currentImage ? '🔄 تغيير الصورة' : '📷 إضافة صورة';
  }

  imgPickBtn.onclick = ()=> imgFileInput.click();
  overlay.querySelector('#imgRemoveBtn').onclick = (e)=>{
    e.stopPropagation();
    currentImage = null;
    imgFileInput.value = '';
    syncImageUI();
  };
  imgFileInput.addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    try{
      currentImage = await compressImageToDataUrl(file, 900, 0.78);
      syncImageUI();
    }catch(err){
      showToast('تعذر تحميل هذي الصورة، جرّب صورة أخرى');
    }
  });

  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeModal(); });
  overlay.querySelector('#cancelBtn').onclick = closeModal;
  overlay.querySelector('#saveBtn').onclick = ()=>{
    const name = overlay.querySelector('#f_name').value.trim();
    const coords = overlay.querySelector('#f_coords').value.trim();
    const notes = overlay.querySelector('#f_notes').value.trim();
    if(!name){ shake(overlay.querySelector('#f_name')); return; }
    if(!selectedCat){ shake(grid); return; }

    let locToSave;
    if(existing){
      existing.name = name; existing.category = selectedCat;
      existing.coords = coords; existing.notes = notes;
      existing.image = currentImage;
      locToSave = existing;
    }else{
      locToSave = {
        id: uid(), name, category: selectedCat, coords, notes, image: currentImage,
        x: state.pendingPos.x, y: state.pendingPos.y, createdAt: Date.now()
      };
      state.locations.push(locToSave);
    }
    saveLocation(locToSave);
    render();
    closeModal();
  };
}

function shake(el){
  el.style.transition='transform .1s';
  el.style.transform='translateX(4px)';
  setTimeout(()=>{ el.style.transform='translateX(-4px)'; }, 80);
  setTimeout(()=>{ el.style.transform=''; }, 160);
}

function closeModal(){
  document.getElementById('modalRoot').innerHTML = '';
  state.pendingPos = null;
}

function deleteLocation(id){
  const idx = state.locations.findIndex(l=>l.id===id);
  if(idx === -1) return;
  const removed = state.locations[idx];
  state.locations.splice(idx,1);
  removeLocationFromDB(id);
  render();
  showToast('تم حذف الموقع', ()=>{
    state.locations.splice(idx,0,removed);
    saveLocation(removed);
    render();
  });
}

/* Search */
document.getElementById('searchInput').addEventListener('input', (e)=>{
  state.search = e.target.value;
  renderList(); renderPins();
});

document.getElementById('clearFiltersBtn').onclick = ()=>{
  state.activeFilters = new Set(CAT_KEYS);
  state.search = '';
  document.getElementById('searchInput').value = '';
  render();
};

document.getElementById('addBtn').onclick = (e)=>{
  if(state.placingMode){ exitPlacingMode(); return; }
  enterPlacingMode(e.clientX, e.clientY);
};

/* Export */
function parseVector3(coordsText){
  if(!coordsText) return null;
  const parts = coordsText.split(',').map(s=>parseFloat(s.trim()));
  if(parts.length>=3 && parts.slice(0,3).every(n=>!isNaN(n))) return parts.slice(0,3);
  return null;
}

function buildLuaExport(){
  let out = 'RobberyLocations = {\n';
  CAT_KEYS.forEach(key=>{
    const items = state.locations.filter(l=>l.category===key);
    out += `    ${key} = {\n`;
    items.forEach(l=>{
      const v = parseVector3(l.coords);
      const coordsStr = v ? `vector3(${v[0]}, ${v[1]}, ${v[2]})` : (l.coords ? `"${l.coords.replace(/"/g,"'")}"` : 'nil');
      out += `        { name = "${(l.name||'').replace(/"/g,"'")}", coords = ${coordsStr}, notes = "${(l.notes||'').replace(/"/g,"'")}" },\n`;
    });
    out += `    },\n`;
  });
  out += '}\n';
  return out;
}

function buildJsonExport(){
  return JSON.stringify(state.locations, null, 2);
}

document.getElementById('exportBtn').onclick = ()=>{
  const root = document.getElementById('modalRoot');
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal" style="width:520px;">
      <h2>⤓ تصدير المواقع</h2>
      <div class="export-tabs">
        <div class="export-tab active" data-fmt="lua">Lua</div>
        <div class="export-tab" data-fmt="json">JSON</div>
      </div>
      <div class="export-output mono" id="exportOutput"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="closeExportBtn">إغلاق</button>
        <button class="btn btn-primary" id="copyExportBtn">نسخ المحتوى</button>
      </div>
    </div>
  `;
  root.appendChild(overlay);
  const out = overlay.querySelector('#exportOutput');
  let fmt = 'lua';
  function refresh(){ out.textContent = fmt==='lua' ? buildLuaExport() : buildJsonExport(); }
  refresh();
  overlay.querySelectorAll('.export-tab').forEach(tab=>{
    tab.onclick = ()=>{
      overlay.querySelectorAll('.export-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      fmt = tab.dataset.fmt;
      refresh();
    };
  });
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) root.innerHTML=''; });
  overlay.querySelector('#closeExportBtn').onclick = ()=>{ root.innerHTML=''; };
  overlay.querySelector('#copyExportBtn').onclick = ()=>{
    copyText(out.textContent);
    showToast('تم نسخ البيانات');
  };
};

const DEFAULT_BG_W = 973;
const DEFAULT_BG_H = 1107;

function fitStageToImage(natW, natH){
  const wrapRect = mapWrap.getBoundingClientRect();
  const wrapW = wrapRect.width, wrapH = wrapRect.height;
  const imgRatio = natW / natH;
  const wrapRatio = wrapW / wrapH;
  let stageW, stageH;
  if(imgRatio > wrapRatio){
    stageW = wrapW;
    stageH = wrapW / imgRatio;
  }else{
    stageH = wrapH;
    stageW = wrapH * imgRatio;
  }
  mapStage.style.width = stageW + 'px';
  mapStage.style.height = stageH + 'px';
  stageOffsetX = (wrapW - stageW) / 2;
  stageOffsetY = (wrapH - stageH) / 2;
  mapStage.style.left = stageOffsetX + 'px';
  mapStage.style.top = stageOffsetY + 'px';
  mapStage.style.right = 'auto';
  mapStage.style.bottom = 'auto';
}

function activateBackground(cssSrc, natW, natH){
  fitStageToImage(natW, natH);
  zoom = 1; panX = 0; panY = 0; applyTransform();
  mapStage.style.backgroundImage = `url("${cssSrc}")`;
  mapStage.style.backgroundSize = '100% 100%';
  mapStage.style.backgroundPosition = 'center';
  mapStage.style.backgroundRepeat = 'no-repeat';
  mapStage.style.outline = '2px solid var(--amber)';
  mapStage.style.outlineOffset = '0px';
  document.getElementById('zones').style.display = 'none';
  document.getElementById('removeMapBtn').style.display = 'inline-block';
}

function loadBackgroundFromUrl(url){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>{
      activateBackground(url, img.naturalWidth, img.naturalHeight);
      document.getElementById('mapHint').textContent = 'الخلفية محفوظة وتظهر تلقائياً لأي شخص يفتح هذا الملف';
      resolve();
    };
    img.onerror = ()=> reject(new Error('load-failed'));
    img.src = url;
  });
}

function loadDefaultBackground(){
  activateBackground(DEFAULT_BG_SRC, DEFAULT_BG_W, DEFAULT_BG_H);
  document.getElementById('mapHint').textContent = 'خريطة GTA V الافتراضية — تظهر تلقائياً لأي شخص يفتح هذا الملف';
}

function restoreSavedBackground(){
  if(!firebaseReady){ loadDefaultBackground(); return; }
  db.ref('settings/bgImageUrl').on('value', (snapshot)=>{
    const url = snapshot.val();
    if(url){
      loadBackgroundFromUrl(url).catch(()=>{
        showToast('تعذر تحديث آخر خلفية محفوظة، سيتم عرض خريطة GTA V الافتراضية بدلاً منها');
        loadDefaultBackground();
      });
    }else{
      loadDefaultBackground();
    }
  });
}

function openBgModal(){
  const root = document.getElementById('modalRoot');
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>🗺️ خلفية الخريطة</h2>
      <div class="field">
        <label>من جهازك (مؤقت)</label>
        <button class="btn btn-ghost" id="bgPickFileBtn" style="width:100%">اختيار صورة من الجهاز</button>
        <div class="field-hint">ما تُحفظ — تحتاج تعيد اختيارها كل ما فتحت الملف من جديد</div>
      </div>
      <div class="divider" style="margin:16px 0"></div>
      <div class="field">
        <label>من رابط مباشر للصورة (يُحفظ تلقائياً)</label>
        <input type="text" id="bgUrlInput" class="mono" placeholder="https://example.com/map.png">
        <div class="field-hint">لازم يكون رابط مباشر للصورة ومستضاف بشكل دائم — روابط ديسكورد المؤقتة تنتهي بعد وقت. ملاحظة: هذي الخلفية تنحفظ لكل من يفتح هذا الملف، مو لك فقط</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="bgCancelBtn">إلغاء</button>
        <button class="btn btn-primary" id="bgUrlLoadBtn">تحميل وحفظ</button>
      </div>
    </div>
  `;
  root.appendChild(overlay);
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) root.innerHTML=''; });
  overlay.querySelector('#bgCancelBtn').onclick = ()=>{ root.innerHTML=''; };
  overlay.querySelector('#bgPickFileBtn').onclick = ()=>{
    root.innerHTML = '';
    document.getElementById('mapFileInput').click();
  };
  overlay.querySelector('#bgUrlLoadBtn').onclick = async ()=>{
    const url = overlay.querySelector('#bgUrlInput').value.trim();
    if(!url) return;
    try{
      await loadBackgroundFromUrl(url);
      if(firebaseReady){ await db.ref('settings/bgImageUrl').set(url); }
      root.innerHTML = '';
      showToast('تم تحميل الخلفية وحفظها');
    }catch(e){
      showToast('تعذر تحميل الصورة من هذا الرابط، تأكد إنه رابط مباشر وصالح');
    }
  };
}

document.getElementById('loadMapBtn').onclick = openBgModal;
document.getElementById('mapFileInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const dataUrl = ev.target.result;
    const img = new Image();
    img.onload = ()=>{
      activateBackground(dataUrl, img.naturalWidth, img.naturalHeight);
      document.getElementById('mapHint').textContent = 'الدبابيس محفوظة دائماً، لكن لازم تعيد تحميل هذي الخلفية كل ما فتحت الملف من جديد (ما تُحفظ)';
    };
    img.src = dataUrl;
  };
  reader.readAsDataURL(file);
});
document.getElementById('removeMapBtn').onclick = async ()=>{
  document.getElementById('mapFileInput').value = '';
  if(firebaseReady){
    try{ await db.ref('settings/bgImageUrl').remove(); }catch(e){ /* ignore */ }
  }
  loadDefaultBackground();
};


renderZones();
loadData();
restoreSavedBackground();
</script>
